services:
  postgres:
    image: postgres:13
    container_name: urban_mobility_airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: urban_mobility_airflow_webserver
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: "urban_mobility_secret_key_123"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - .:/opt/airflow/project
      - ./secrets:/opt/airflow/project/secrets
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Brian
      --lastname Heck
      --role Admin
      --email admin@example.com || true &&
      airflow webserver
      "

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: urban_mobility_airflow_scheduler
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: "urban_mobility_secret_key_123"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - .:/opt/airflow/project
      - ./secrets:/opt/airflow/project/secrets
    command: >
      bash -c "
      airflow db migrate &&
      airflow scheduler
      "

volumes:
  postgres-db-volume: